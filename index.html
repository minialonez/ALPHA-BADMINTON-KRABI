<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
(async () => {
  try {
    const res = await api.ping();
    document.getElementById('apiStatus').innerHTML = '<span class="badge badge-success">✓ API connected</span>';
  } catch (e) {
    document.getElementById('apiStatus').innerHTML = '<span class="badge badge-danger">✗ API error</span>';
    console.error(e);
  }
})();
</script>
