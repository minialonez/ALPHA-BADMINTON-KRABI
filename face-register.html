<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงทะเบียนใบหน้า · ALPHA BADMINTON</title>
<style>
:root {
  --bg: #ffffff;
  --bg-2: #f6f8fa;
  --text: #1a1a1a;
  --text-2: #6b7280;
  --text-3: #9ca3af;
  --border: #e5e7eb;
  --primary: #1F4E78;
  --primary-2: #18445f;
  --primary-50: #ebf2f8;
  --success: #15803d;
  --success-bg: #f0fdf4;
  --warning: #b45309;
  --warning-bg: #fffbeb;
  --danger: #b91c1c;
  --danger-bg: #fef2f2;
  --info: #0369a1;
  --info-bg: #f0f9ff;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", "Noto Sans Thai", sans-serif;
  background: var(--bg-2);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}
.container { max-width: 880px; margin: 0 auto; padding: 1rem; }
h1, h2, h3 { font-weight: 500; margin-top: 0; }
h2 { font-size: 1.25rem; }
h3 { font-size: 1.05rem; }
.card {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 12px; }
button, .btn {
  font-family: inherit;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-block;
}
button:hover, .btn:hover { background: var(--bg-2); }
button.primary, .btn.primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
button.primary:hover, .btn.primary:hover { background: var(--primary-2); }
button:disabled, .btn:disabled { opacity: 0.5; cursor: not-allowed; }
input, select, textarea {
  font-family: inherit;
  font-size: 14px;
  padding: 8px 12px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  width: 100%;
  color: var(--text);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-50);
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 1rem;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.header h1 { margin: 0; font-size: 1rem; font-weight: 500; color: var(--primary); }
.muted { color: var(--text-2); font-size: 12px; }
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin: 8px 0;
  font-size: 14px;
}
.alert-success { background: var(--success-bg); color: var(--success); }
.alert-warning { background: var(--warning-bg); color: var(--warning); }
.alert-danger { background: var(--danger-bg); color: var(--danger); }
.alert-info { background: var(--info-bg); color: var(--info); }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.camera-card {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 3/4;
  position: relative;
}
.camera-card video, .camera-card canvas {
  width: 100%; height: 100%; object-fit: cover;
}
.camera-card video {
  transform: scaleX(-1);
}
.camera-card canvas {
  position: absolute; top: 0; left: 0;
  transform: scaleX(-1);
}
.camera-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
  padding: 12px;
  font-size: 13px;
  z-index: 1;
}
.status-pill {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 16px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(4px);
  font-size: 11px;
  font-weight: 500;
}
.list-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
}
.list-row:hover { background: var(--bg-2); }
.stepper {
  display: flex;
  gap: 8px;
  margin: 1rem 0;
}
.step {
  flex: 1;
  text-align: center;
  padding: 10px;
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  opacity: 0.45;
  transition: all 0.2s;
}
.step.active {
  background: var(--primary-50);
  color: var(--primary);
  opacity: 1;
  font-weight: 500;
}
.step.done {
  background: var(--success-bg);
  color: var(--success);
  opacity: 1;
}
progress {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  border: none;
}
progress::-webkit-progress-bar { background: var(--bg-2); border-radius: 4px; }
progress::-webkit-progress-value { background: var(--primary); border-radius: 4px; }
progress::-moz-progress-bar { background: var(--primary); border-radius: 4px; }
.back-btn {
  font-size: 12px;
  padding: 6px 12px;
}
</style>
</head>
<body>
<div class="header">
  <h1>🏸 ลงทะเบียนใบหน้า</h1>
  <a href="index.html" class="btn back-btn">← กลับหน้าหลัก</a>
</div>

<div class="container">
  <div class="card" id="setupCard">
    <h3>เลือกสมาชิกที่จะลงทะเบียนใบหน้า</h3>
    <input type="text" id="searchInput" placeholder="ค้นชื่อ / ชื่อเล่น / DisplayID / เบอร์โทร">
    <div id="searchResults" class="mt-1"></div>
  </div>

  <div id="wizard" style="display:none;">
    <div class="card">
      <p class="muted" style="margin:0;">กำลังลงทะเบียนใบหน้าให้</p>
      <h2 id="memberLabel"></h2>

      <div class="stepper">
        <div class="step" id="step1">1. หน้าตรง</div>
        <div class="step" id="step2">2. หันซ้าย</div>
        <div class="step" id="step3">3. หันขวา</div>
      </div>

      <div class="camera-card" style="aspect-ratio:1;max-width:400px;margin:0 auto;">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
      </div>

      <p id="instructionText" style="text-align:center;font-size:18px;margin:1rem 0;"></p>
      <progress id="captureProgress" value="0" max="5"></progress>
      <p class="muted text-center" id="captureLabel"></p>

      <div id="resultArea"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzarzLBCNsC9CLRNkwcdUo1RZZCrHpkkswhzNQWNuKJxqQZ28XIBHdd-JEWwkor1pdy/exec',
  API_KEY: 'ALPHA BADMINTON-KRABI',
  BUSINESS_NAME: 'ALPHA BADMINTON KRABI',
  FACE_MATCH_THRESHOLD: 0.5,
  FACE_DESCRIPTOR_SAMPLES: 5,
  MODELS_URL: 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights',
};

const api = {
  async call(action, params = {}) {
    const res = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ apiKey: CONFIG.API_KEY, action, params }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'API error');
    return data.data;
  },
  ping() { return this.call('ping'); },
  getCourses() { return this.call('getCourses'); },
  getMember(uuid) { return this.call('getMember', { uuid }); },
  searchMember(query) { return this.call('searchMember', { query }); },
  getMembersForFaceMatch() { return this.call('getMembersForFaceMatch'); },
  createMember(data) { return this.call('createMember', data); },
  registerFace(personUuid, descriptors) {
    return this.call('registerFace', { personUuid, descriptors });
  },
  getActiveEnrollments(memberUuid) {
    return this.call('getActiveEnrollments', { memberUuid });
  },
  checkIn(personUuid, enrollmentUuid, coachUuid, method) {
    return this.call('checkIn', { personUuid, enrollmentUuid, coachUuid, method });
  },
  getAttendanceToday() { return this.call('getAttendanceToday'); },
  getMemberAttendance(memberUuid, limit) {
    return this.call('getMemberAttendance', { memberUuid, limit });
  },
};

const Face = {
  loaded: false,
  async loadModels() {
    if (this.loaded) return;
    await faceapi.nets.tinyFaceDetector.loadFromUri(CONFIG.MODELS_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(CONFIG.MODELS_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(CONFIG.MODELS_URL);
    this.loaded = true;
  },
  async detectFaceWithDescriptor(videoEl) {
    return await faceapi
      .detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({
        inputSize: 320, scoreThreshold: 0.5
      }))
      .withFaceLandmarks()
      .withFaceDescriptor();
  },
  computeMatch(queryDescriptor, candidates, threshold) {
    threshold = threshold || CONFIG.FACE_MATCH_THRESHOLD;
    let best = null;
    candidates.forEach(c => {
      if (!c.FaceDescriptors) return;
      try {
        const data = typeof c.FaceDescriptors === 'string'
          ? JSON.parse(c.FaceDescriptors) : c.FaceDescriptors;
        ['front', 'left', 'right'].forEach(pose => {
          if (!data[pose]) return;
          const stored = new Float32Array(data[pose]);
          const dist = faceapi.euclideanDistance(queryDescriptor, stored);
          if (dist < threshold && (!best || dist < best.distance)) {
            best = { member: c, pose: pose, distance: dist };
          }
        });
      } catch (e) {}
    });
    return best;
  },
  averageDescriptors(descriptors) {
    if (descriptors.length === 0) return null;
    const dim = descriptors[0].length;
    const avg = new Float32Array(dim);
    descriptors.forEach(d => {
      for (let i = 0; i < dim; i++) avg[i] += d[i];
    });
    for (let i = 0; i < dim; i++) avg[i] /= descriptors.length;
    return Array.from(avg);
  },
};
</script>
<script>
let currentMember = null;
let currentStep = 1;
const samples = { front: [], left: [], right: [] };
const NEEDED = CONFIG.FACE_DESCRIPTOR_SAMPLES;
const stepLabels = ['', 'หน้าตรง', 'หันซ้าย ~30°', 'หันขวา ~30°'];
const stepKeys = ['', 'front', 'left', 'right'];

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(e.target.value), 300);
});

async function doSearch(q) {
  const container = document.getElementById('searchResults');
  if (q.length < 2) { container.innerHTML = ''; return; }
  try {
    const results = await api.searchMember(q);
    if (results.length === 0) { container.innerHTML = '<p class="muted">ไม่พบสมาชิก</p>'; return; }
    container.innerHTML = results.map(m =>
      '<div class="list-row" onclick="selectMember(\'' + m.UUID + '\')">' +
        '<div style="flex:1;">' +
          '<div style="font-weight:500;">' + (m.Nickname || m.FirstName) +
          ' ' + (m.LastName || '') + '</div>' +
          '<div class="muted">' + m.DisplayID + ' · ' + (m.Phone || '') + '</div>' +
        '</div>' +
      '</div>').join('');
  } catch (e) {
    container.innerHTML = '<div class="alert alert-danger">' + e.message + '</div>';
  }
}

async function selectMember(uuid) {
  try {
    currentMember = await api.getMember(uuid);
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('wizard').style.display = 'block';
    document.getElementById('memberLabel').textContent =
      (currentMember.Nickname || currentMember.FirstName) + ' ' +
      (currentMember.LastName || '') + ' · ' + currentMember.DisplayID;
    await startCamera();
    startStep(1);
  } catch (e) { alert(e.message); }
}
window.selectMember = selectMember;

const videoEl = document.getElementById('video');
const overlayEl = document.getElementById('overlay');
let capturing = false;

async function startCamera() {
  await Face.loadModels();
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
  videoEl.srcObject = stream;
  await new Promise(r => videoEl.onloadedmetadata = r);
  overlayEl.width = videoEl.videoWidth;
  overlayEl.height = videoEl.videoHeight;
}

function startStep(n) {
  currentStep = n;
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step' + i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  document.getElementById('instructionText').textContent =
    'กรุณา' + stepLabels[n] + ' ช้า ๆ และค้างไว้';
  document.getElementById('captureProgress').value = 0;
  document.getElementById('captureProgress').max = NEEDED;
  document.getElementById('captureLabel').textContent = '';
  capturing = true;
  captureLoop();
}

async function captureLoop() {
  if (!capturing) return;
  try {
    const detection = await Face.detectFaceWithDescriptor(videoEl);
    const ctx = overlayEl.getContext('2d');
    ctx.clearRect(0, 0, overlayEl.width, overlayEl.height);
    if (detection) {
      const box = detection.detection.box;
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 3;
      ctx.strokeRect(box.x, box.y, box.width, box.height);

      const key = stepKeys[currentStep];
      samples[key].push(Array.from(detection.descriptor));
      const n = samples[key].length;
      document.getElementById('captureProgress').value = n;
      document.getElementById('captureLabel').textContent = 'เก็บตัวอย่าง ' + n + ' / ' + NEEDED;
      if (n >= NEEDED) {
        capturing = false;
        if (currentStep < 3) {
          await new Promise(r => setTimeout(r, 1000));
          startStep(currentStep + 1);
        } else {
          submitAll();
        }
        return;
      }
    }
  } catch (e) { console.error(e); }
  setTimeout(captureLoop, 300);
}

async function submitAll() {
  document.getElementById('instructionText').textContent = '⏳ กำลังบันทึก...';
  document.getElementById('captureLabel').textContent = '';
  try {
    const descriptors = {
      front: Face.averageDescriptors(samples.front),
      left:  Face.averageDescriptors(samples.left),
      right: Face.averageDescriptors(samples.right),
    };
    await api.registerFace(currentMember.UUID, descriptors);
    for (let i = 1; i <= 3; i++) document.getElementById('step' + i).className = 'step done';
    document.getElementById('resultArea').innerHTML =
      '<div class="alert alert-success mt-2">✅ ลงทะเบียนใบหน้าสำเร็จ! ใช้สแกนหน้าเช็คชื่อได้แล้ว</div>' +
      '<button class="primary" style="width:100%;margin-top:8px;" onclick="location.reload()">ลงทะเบียนคนถัดไป</button>';
    if (videoEl.srcObject) videoEl.srcObject.getTracks().forEach(t => t.stop());
  } catch (e) {
    document.getElementById('resultArea').innerHTML =
      '<div class="alert alert-danger mt-2">' + e.message + '</div>';
  }
}
</script>
</body>
</html>
