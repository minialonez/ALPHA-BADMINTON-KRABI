<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เช็คชื่อ · ALPHA BADMINTON</title>
<style>
:root {
  --bg: #ffffff;
  --bg-2: #f6f8fa;
  --text: #1a1a1a;
  --text-2: #6b7280;
  --text-3: #9ca3af;
  --border: #e5e7eb;
  --primary: #1F4E78;
  --primary-2: #18445f;
  --primary-50: #ebf2f8;
  --success: #15803d;
  --success-bg: #f0fdf4;
  --warning: #b45309;
  --warning-bg: #fffbeb;
  --danger: #b91c1c;
  --danger-bg: #fef2f2;
  --info: #0369a1;
  --info-bg: #f0f9ff;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", "Noto Sans Thai", sans-serif;
  background: var(--bg-2);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}
.container { max-width: 880px; margin: 0 auto; padding: 1rem; }
h1, h2, h3 { font-weight: 500; margin-top: 0; }
h2 { font-size: 1.25rem; }
h3 { font-size: 1.05rem; }
.card {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 12px; }
button, .btn {
  font-family: inherit;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-block;
}
button:hover, .btn:hover { background: var(--bg-2); }
button.primary, .btn.primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
button.primary:hover, .btn.primary:hover { background: var(--primary-2); }
button:disabled, .btn:disabled { opacity: 0.5; cursor: not-allowed; }
input, select, textarea {
  font-family: inherit;
  font-size: 14px;
  padding: 8px 12px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  width: 100%;
  color: var(--text);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-50);
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 1rem;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.header h1 { margin: 0; font-size: 1rem; font-weight: 500; color: var(--primary); }
.muted { color: var(--text-2); font-size: 12px; }
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin: 8px 0;
  font-size: 14px;
}
.alert-success { background: var(--success-bg); color: var(--success); }
.alert-warning { background: var(--warning-bg); color: var(--warning); }
.alert-danger { background: var(--danger-bg); color: var(--danger); }
.alert-info { background: var(--info-bg); color: var(--info); }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.camera-card {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 3/4;
  position: relative;
}
.camera-card video, .camera-card canvas {
  width: 100%; height: 100%; object-fit: cover;
}
.camera-card video {
  transform: scaleX(-1);
}
.camera-card canvas {
  position: absolute; top: 0; left: 0;
  transform: scaleX(-1);
}
.camera-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
  padding: 12px;
  font-size: 13px;
  z-index: 1;
}
.status-pill {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 16px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(4px);
  font-size: 11px;
  font-weight: 500;
}
.list-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
}
.list-row:hover { background: var(--bg-2); }
.stepper {
  display: flex;
  gap: 8px;
  margin: 1rem 0;
}
.step {
  flex: 1;
  text-align: center;
  padding: 10px;
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  opacity: 0.45;
  transition: all 0.2s;
}
.step.active {
  background: var(--primary-50);
  color: var(--primary);
  opacity: 1;
  font-weight: 500;
}
.step.done {
  background: var(--success-bg);
  color: var(--success);
  opacity: 1;
}
progress {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  border: none;
}
progress::-webkit-progress-bar { background: var(--bg-2); border-radius: 4px; }
progress::-webkit-progress-value { background: var(--primary); border-radius: 4px; }
progress::-moz-progress-bar { background: var(--primary); border-radius: 4px; }
.back-btn {
  font-size: 12px;
  padding: 6px 12px;
}

  .kiosk-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  @media (max-width: 768px) { .kiosk-layout { grid-template-columns: 1fr; } }
  .panel { display: flex; flex-direction: column; gap: 12px; }
  .course-remaining {
    font-size: 24px;
    font-weight: 500;
  }
  .recent {
    max-height: 200px;
    overflow-y: auto;
    font-size: 12px;
  }
  .recent-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .recent-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="header">
  <h1>🏸 ALPHA BADMINTON · เช็คชื่อ</h1>
  <div style="display: flex; align-items: center; gap: 12px;">
    <span class="muted" id="clock"></span>
    <a href="index.html" class="btn back-btn">← กลับหน้าหลัก</a>
  </div>
</div>

<div class="kiosk-layout">
  <div class="camera-card">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="camera-overlay">
      <span class="status-pill" id="cameraStatus">🎥 กำลังเริ่มกล้อง...</span>
    </div>
  </div>

  <div class="panel">
    <div class="card" id="statusCard">
      <h3 id="statusTitle">⏳ กำลังโหลด...</h3>
      <p class="muted" id="statusMessage">โหลด face recognition model ครั้งแรกอาจใช้เวลา 30-60 วินาที</p>
      <progress id="loadProgress" value="0" max="100"></progress>
    </div>

    <div class="card" id="memberCard" style="display: none;">
      <p class="muted" style="margin: 0;">ยินดีต้อนรับ</p>
      <h2 id="memberName" style="margin: 4px 0;"></h2>
      <p class="muted" id="memberId" style="margin: 0;"></p>
    </div>

    <div class="card" id="coursesCard" style="display: none;">
      <p style="margin-top: 0;"><strong>เลือกคอร์สที่จะใช้วันนี้</strong></p>
      <div id="coursesList"></div>
    </div>

    <div id="resultArea"></div>

    <div class="card">
      <p style="margin-top: 0;"><strong>มาเรียนแล้ววันนี้</strong> <span class="muted" id="todayCount"></span></p>
      <div class="recent" id="recentList">
        <p class="muted">กำลังโหลด...</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzarzLBCNsC9CLRNkwcdUo1RZZCrHpkkswhzNQWNuKJxqQZ28XIBHdd-JEWwkor1pdy/exec',
  API_KEY: 'ALPHA BADMINTON-KRABI',
  BUSINESS_NAME: 'ALPHA BADMINTON KRABI',
  FACE_MATCH_THRESHOLD: 0.5,
  FACE_DESCRIPTOR_SAMPLES: 5,
  MODELS_URL: 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights',
};

const api = {
  async call(action, params = {}) {
    const res = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ apiKey: CONFIG.API_KEY, action, params }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'API error');
    return data.data;
  },
  ping() { return this.call('ping'); },
  getCourses() { return this.call('getCourses'); },
  getMember(uuid) { return this.call('getMember', { uuid }); },
  searchMember(query) { return this.call('searchMember', { query }); },
  getMembersForFaceMatch() { return this.call('getMembersForFaceMatch'); },
  createMember(data) { return this.call('createMember', data); },
  registerFace(personUuid, descriptors) {
    return this.call('registerFace', { personUuid, descriptors });
  },
  getActiveEnrollments(memberUuid) {
    return this.call('getActiveEnrollments', { memberUuid });
  },
  checkIn(personUuid, enrollmentUuid, coachUuid, method) {
    return this.call('checkIn', { personUuid, enrollmentUuid, coachUuid, method });
  },
  getAttendanceToday() { return this.call('getAttendanceToday'); },
  getMemberAttendance(memberUuid, limit) {
    return this.call('getMemberAttendance', { memberUuid, limit });
  },
};

const Face = {
  loaded: false,
  async loadModels() {
    if (this.loaded) return;
    await faceapi.nets.tinyFaceDetector.loadFromUri(CONFIG.MODELS_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(CONFIG.MODELS_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(CONFIG.MODELS_URL);
    this.loaded = true;
  },
  async detectFaceWithDescriptor(videoEl) {
    return await faceapi
      .detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({
        inputSize: 320, scoreThreshold: 0.5
      }))
      .withFaceLandmarks()
      .withFaceDescriptor();
  },
  computeMatch(queryDescriptor, candidates, threshold) {
    threshold = threshold || CONFIG.FACE_MATCH_THRESHOLD;
    let best = null;
    candidates.forEach(c => {
      if (!c.FaceDescriptors) return;
      try {
        const data = typeof c.FaceDescriptors === 'string'
          ? JSON.parse(c.FaceDescriptors) : c.FaceDescriptors;
        ['front', 'left', 'right'].forEach(pose => {
          if (!data[pose]) return;
          const stored = new Float32Array(data[pose]);
          const dist = faceapi.euclideanDistance(queryDescriptor, stored);
          if (dist < threshold && (!best || dist < best.distance)) {
            best = { member: c, pose: pose, distance: dist };
          }
        });
      } catch (e) {}
    });
    return best;
  },
  averageDescriptors(descriptors) {
    if (descriptors.length === 0) return null;
    const dim = descriptors[0].length;
    const avg = new Float32Array(dim);
    descriptors.forEach(d => {
      for (let i = 0; i < dim; i++) avg[i] += d[i];
    });
    for (let i = 0; i < dim; i++) avg[i] /= descriptors.length;
    return Array.from(avg);
  },
};
</script>
<script>
const videoEl = document.getElementById('video');
const overlayEl = document.getElementById('overlay');
const cameraStatusEl = document.getElementById('cameraStatus');
let candidates = [];
let detecting = false;
let coolingDown = false;
let todayAttendance = []; // เก็บ attendance วันนี้สำหรับตรวจซ้ำ

function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short' }) + ' · ' +
    d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

function setStatus(title, message, isError) {
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusMessage').textContent = message || '';
  document.getElementById('statusCard').style.background = isError ? 'var(--danger-bg)' : '';
}

async function init() {
  try {
    setStatus('⏳ โหลด face models...', '');
    document.getElementById('loadProgress').value = 10;
    await Face.loadModels();
    document.getElementById('loadProgress').value = 50;

    setStatus('⏳ โหลดข้อมูลสมาชิก...');
    candidates = await api.getMembersForFaceMatch();
    document.getElementById('loadProgress').value = 75;

    setStatus('⏳ เริ่มกล้อง...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    videoEl.srcObject = stream;
    await new Promise(r => videoEl.onloadedmetadata = r);
    overlayEl.width = videoEl.videoWidth;
    overlayEl.height = videoEl.videoHeight;
    document.getElementById('loadProgress').value = 100;

    setStatus('✅ พร้อมใช้งาน', 'สมาชิกในระบบ ' + candidates.length + ' คน · มองเข้ากล้องเพื่อเช็คชื่อ');
    cameraStatusEl.textContent = '👀 กำลังตรวจจับใบหน้า...';

    loadRecent();
    setInterval(loadRecent, 30000);
    detectLoop();
  } catch (e) {
    setStatus('❌ เกิดข้อผิดพลาด', e.message, true);
    console.error(e);
  }
}

async function loadRecent() {
  try {
    todayAttendance = await api.getAttendanceToday();
    const list = document.getElementById('recentList');
    document.getElementById('todayCount').textContent = '(' + todayAttendance.length + ' คน)';
    if (todayAttendance.length === 0) {
      list.innerHTML = '<p class="muted">ยังไม่มีใครเช็คชื่อวันนี้</p>';
      return;
    }
    list.innerHTML = todayAttendance.slice(0, 10).map(r => {
      const t = new Date(r.CheckInDateTime).toLocaleTimeString('th-TH',
        { hour: '2-digit', minute: '2-digit' });
      return '<div class="recent-item"><span>' + t + ' · ' + r.Name +
             '</span><span class="muted">' + r.Role + '</span></div>';
    }).join('');
  } catch (e) {
    console.error('loadRecent', e);
  }
}

async function detectLoop() {
  if (coolingDown) { setTimeout(detectLoop, 300); return; }
  if (!detecting) {
    detecting = true;
    try {
      const detection = await Face.detectFaceWithDescriptor(videoEl);
      const ctx = overlayEl.getContext('2d');
      ctx.clearRect(0, 0, overlayEl.width, overlayEl.height);
      if (detection) {
        const box = detection.detection.box;
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 3;
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        const match = Face.computeMatch(detection.descriptor, candidates);
        if (match) {
          await onMatch(match);
        }
      }
    } catch (e) {
      console.error('detect', e);
    } finally {
      detecting = false;
    }
  }
  setTimeout(detectLoop, 300);
}

async function onMatch(match) {
  coolingDown = true;
  cameraStatusEl.textContent = '✅ ' + (match.member.Nickname || match.member.FirstName);
  document.getElementById('statusCard').style.display = 'none';
  const memberCard = document.getElementById('memberCard');
  memberCard.style.display = 'block';
  document.getElementById('memberName').textContent =
    match.member.Nickname ? match.member.Nickname + ' (' + match.member.FirstName + ')' : match.member.FirstName;
  document.getElementById('memberId').textContent =
    match.member.DisplayID + ' · ' + match.member.Role;

  if (match.member.Role === 'staff' || match.member.Role === 'admin') {
    await checkInStaff(match.member);
  } else {
    await showCourses(match.member);
  }
}

async function showCourses(member) {
  const card = document.getElementById('coursesCard');
  card.style.display = 'block';
  const list = document.getElementById('coursesList');
  list.innerHTML = '<p class="muted">กำลังโหลดคอร์ส...</p>';
  try {
    const enrollments = await api.getActiveEnrollments(member.UUID);
    if (enrollments.length === 0) {
      list.innerHTML = '<div class="alert alert-warning">❌ ไม่มีคอร์สที่ active · ติดต่อแอดมิน</div>';
      setTimeout(reset, 5000);
      return;
    }
    list.innerHTML = '';
    enrollments.forEach(e => {
      const div = document.createElement('div');
      const alreadyCheckedIn = todayAttendance.some(a =>
        a.PersonUUID === member.UUID && a.CourseUUID === e.CourseUUID && !a.IsVoided);
      div.className = 'list-row';
      if (alreadyCheckedIn) {
        div.style.opacity = '0.5';
        div.style.pointerEvents = 'none';
        div.style.cursor = 'not-allowed';
      }
      const warn = e.RemainingSessions <= 2;
      const color = warn ? 'var(--warning)' : 'var(--text)';
      div.innerHTML =
        '<div style="flex:1;">' +
          '<div style="font-weight:500;">' + (e.CourseName || '-') +
          (alreadyCheckedIn ? ' <span class="badge badge-success">มาแล้ววันนี้</span>' : '') + '</div>' +
          '<div class="muted">หมด ' + (e.ExpiryDate || '-') + ' · เหลือ ' + e.DaysLeft + ' วัน</div>' +
        '</div>' +
        '<div style="text-align:right;">' +
          '<div class="course-remaining" style="color:' + color + ';">' + e.RemainingSessions + '</div>' +
          '<div class="muted">/ ' + e.TotalSessions + ' ครั้ง</div>' +
        '</div>';
      if (!alreadyCheckedIn) {
        div.onclick = () => doCheckIn(member, e);
      }
      list.appendChild(div);
    });

    // ถ้าทุกคอร์สมาแล้ววันนี้ → แสดงข้อความ
    const allCheckedIn = enrollments.every(e =>
      todayAttendance.some(a =>
        a.PersonUUID === member.UUID && a.CourseUUID === e.CourseUUID && !a.IsVoided));
    if (allCheckedIn) {
      const info = document.createElement('div');
      info.className = 'alert alert-info';
      info.innerHTML = 'ⓘ คุณมาเรียนทุกคอร์สแล้ววันนี้ ไม่ต้อง check-in ซ้ำ';
      list.appendChild(info);
      setTimeout(reset, 5000);
    }
  } catch (err) {
    list.innerHTML = '<div class="alert alert-danger">' + err.message + '</div>';
    setTimeout(reset, 5000);
  }
}

async function checkInStaff(member) {
  // เช็คว่าเข้างานวันนี้แล้วยัง
  const alreadyIn = todayAttendance.some(a =>
    a.PersonUUID === member.UUID && a.Role !== 'student' && !a.IsVoided);
  if (alreadyIn) {
    const t = todayAttendance.find(a => a.PersonUUID === member.UUID);
    const time = new Date(t.CheckInDateTime).toLocaleTimeString('th-TH',
      { hour: '2-digit', minute: '2-digit' });
    document.getElementById('resultArea').innerHTML =
      '<div class="card"><div class="alert alert-info">ⓘ คุณเข้างานไปแล้ววันนี้ เวลา ' + time + '</div></div>';
    setTimeout(reset, 4000);
    return;
  }
  try {
    await api.checkIn(member.UUID, null, null, 'face');
    const t = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('resultArea').innerHTML =
      '<div class="card"><div class="alert alert-success">🎉 มาสนุกแล้ว เวลา ' + t + '</div></div>';
    loadRecent();
    setTimeout(reset, 4000);
  } catch (e) { showError(e.message); }
}

async function doCheckIn(member, enrollment) {
  document.getElementById('coursesCard').style.display = 'none';
  try {
    const result = await api.checkIn(member.UUID, enrollment.UUID, null, 'face');
    const warnHtml = (result.warnings || []).map(w =>
      '<div class="alert alert-warning">⚠️ ' + w.text + '</div>').join('');
    document.getElementById('resultArea').innerHTML =
      '<div class="card">' +
        '<div class="alert alert-success">🎉 มาสนุกแล้ว — ' + result.enrollment.CourseName + '</div>' +
        '<p style="font-size:16px;">เหลือ <strong style="font-size:24px;color:var(--primary);">' +
          result.enrollment.Remaining + '</strong> / ' + result.enrollment.Total + ' ครั้ง</p>' +
        '<p class="muted">หมดอายุ ' + result.enrollment.ExpiryDate +
          ' (เหลือ ' + result.enrollment.DaysLeft + ' วัน)</p>' +
        warnHtml +
      '</div>';
    loadRecent();
    setTimeout(reset, 6000);
  } catch (e) { showError(e.message); }
}

function showError(msg) {
  document.getElementById('resultArea').innerHTML =
    '<div class="card"><div class="alert alert-danger">❌ ' + msg + '</div></div>';
  setTimeout(reset, 5000);
}

function reset() {
  coolingDown = false;
  document.getElementById('statusCard').style.display = 'block';
  document.getElementById('memberCard').style.display = 'none';
  document.getElementById('coursesCard').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '';
  setStatus('✅ พร้อมใช้งาน', 'สมาชิกในระบบ ' + candidates.length + ' คน · มองเข้ากล้องเพื่อเช็คชื่อ');
  cameraStatusEl.textContent = '👀 กำลังตรวจจับใบหน้า...';
}

init();
</script>
</body>
</html>
