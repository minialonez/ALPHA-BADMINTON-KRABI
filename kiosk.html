<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>เช็คชื่อ · ALPHA BADMINTON</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');

:root {
  --teal-50: #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0F766E;
  --teal-900: #134E4A;
  --coral-50: #FFF7ED;
  --coral-100: #FFEDD5;
  --coral-500: #F97316;
  --coral-600: #EA580C;
  --coral-700: #C2410C;
  --cream: #FDFBF7;
  --stone-50: #FAFAF9;
  --stone-100: #F5F5F4;
  --stone-200: #E7E5E4;
  --stone-300: #D6D3D1;
  --stone-500: #78716C;
  --stone-700: #44403C;
  --stone-900: #1C1917;
  --success: #16A34A;
  --success-bg: #DCFCE7;
  --warning: #EA580C;
  --warning-bg: #FFEDD5;
  --danger: #DC2626;
  --danger-bg: #FEE2E2;
  --info: #0284C7;
  --info-bg: #E0F2FE;
  --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
  --shadow-md: 0 4px 12px rgba(28, 25, 23, 0.06);
  --shadow-lg: 0 12px 32px rgba(28, 25, 23, 0.08);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --r-full: 9999px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif;
  background: var(--cream);
  color: var(--stone-900);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11';
}

h1, h2, h3, h4 {
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--stone-900);
}
h1 { font-size: 1.5rem; line-height: 1.2; }
h2 { font-size: 1.5rem; line-height: 1.25; font-weight: 700; }
h3 { font-size: 1.125rem; line-height: 1.4; }
p { margin: 0; }

/* ===== App Shell ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(253, 251, 247, 0.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--stone-200);
  padding: 14px 20px;
}
.app-header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--stone-900);
  text-decoration: none;
  letter-spacing: -0.01em;
}
.brand-emoji {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--teal-500) 0%, var(--teal-700) 100%);
  border-radius: 10px;
  font-size: 1.1rem;
  box-shadow: 0 2px 8px rgba(13, 148, 136, 0.3);
}
.brand-sub { color: var(--stone-500); font-weight: 500; font-size: 0.85rem; }

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 48px;
}
.container-wide { max-width: 1100px; }

/* ===== Cards ===== */
.card {
  background: white;
  border-radius: var(--r-lg);
  padding: 24px;
  border: 1px solid var(--stone-200);
  box-shadow: var(--shadow-sm);
}
.card-elevated {
  border: none;
  box-shadow: var(--shadow-md);
}
.card + .card { margin-top: 16px; }

/* ===== Buttons ===== */
.btn {
  font-family: inherit;
  font-weight: 600;
  font-size: 15px;
  padding: 12px 20px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--stone-200);
  background: white;
  color: var(--stone-900);
  cursor: pointer;
  transition: all 0.18s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
}
.btn:hover {
  border-color: var(--stone-300);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn:active { transform: translateY(0); }
.btn-primary {
  background: var(--teal-600);
  border-color: var(--teal-600);
  color: white;
  box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25);
}
.btn-primary:hover {
  background: var(--teal-700);
  border-color: var(--teal-700);
  box-shadow: 0 6px 16px rgba(13, 148, 136, 0.35);
}
.btn-accent {
  background: var(--coral-500);
  border-color: var(--coral-500);
  color: white;
  box-shadow: 0 2px 8px rgba(249, 115, 22, 0.25);
}
.btn-accent:hover {
  background: var(--coral-600);
  border-color: var(--coral-600);
  box-shadow: 0 6px 16px rgba(249, 115, 22, 0.35);
}
.btn-ghost {
  border: none;
  background: transparent;
  color: var(--stone-700);
}
.btn-ghost:hover {
  background: var(--stone-100);
  transform: none;
  box-shadow: none;
}
.btn-block { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 13px; min-height: 36px; }
.btn-lg { padding: 16px 24px; font-size: 16px; min-height: 56px; }
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

/* ===== Form ===== */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-weight: 600;
  font-size: 14px;
  color: var(--stone-700);
  margin-bottom: 6px;
}
.form-label-required::after {
  content: ' *';
  color: var(--coral-500);
}
.form-hint {
  font-size: 12px;
  color: var(--stone-500);
  margin-top: 4px;
}
input, select, textarea {
  font-family: inherit;
  font-size: 15px;
  padding: 12px 14px;
  border: 1.5px solid var(--stone-200);
  border-radius: var(--r-md);
  background: white;
  width: 100%;
  color: var(--stone-900);
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--teal-500);
  box-shadow: 0 0 0 4px var(--teal-50);
}
textarea { resize: vertical; min-height: 80px; font-family: inherit; }

/* Radio group */
.radio-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.radio-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 1.5px solid var(--stone-200);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 0.15s;
  background: white;
}
.radio-card:hover { border-color: var(--stone-300); }
.radio-card input { width: auto; margin: 0; }
.radio-card.selected {
  border-color: var(--teal-600);
  background: var(--teal-50);
}

/* Checkbox */
.checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px;
  background: var(--stone-50);
  border-radius: var(--r-md);
  cursor: pointer;
}
.checkbox-row input { width: auto; margin-top: 3px; }
.checkbox-row label { cursor: pointer; flex: 1; font-size: 14px; line-height: 1.5; }

/* ===== Badge / Pill ===== */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.pill-success { background: var(--success-bg); color: var(--success); }
.pill-warning { background: var(--warning-bg); color: var(--warning); }
.pill-danger { background: var(--danger-bg); color: var(--danger); }
.pill-info { background: var(--info-bg); color: var(--info); }
.pill-stone { background: var(--stone-100); color: var(--stone-700); }

/* ===== Alert ===== */
.alert {
  padding: 14px 16px;
  border-radius: var(--r-md);
  font-size: 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.alert-success { background: var(--success-bg); color: var(--success); border: 1px solid #BBF7D0; }
.alert-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid #FED7AA; }
.alert-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #FECACA; }
.alert-info { background: var(--info-bg); color: var(--info); border: 1px solid #BAE6FD; }

/* ===== Camera ===== */
.camera-card {
  background: var(--stone-900);
  border-radius: var(--r-lg);
  overflow: hidden;
  aspect-ratio: 3/4;
  position: relative;
  box-shadow: var(--shadow-md);
}
.camera-card video, .camera-card canvas {
  width: 100%; height: 100%; object-fit: cover;
}
.camera-card video { transform: scaleX(-1); }
.camera-card canvas {
  position: absolute; top: 0; left: 0;
  transform: scaleX(-1);
}
.camera-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
  padding: 16px;
  font-size: 13px;
  z-index: 1;
}
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--r-full);
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  font-size: 12px;
  font-weight: 600;
}

/* ===== Stepper ===== */
.stepper {
  display: flex;
  gap: 4px;
  margin: 20px 0 24px;
}
.step {
  flex: 1;
  text-align: center;
  padding: 10px 12px;
  background: var(--stone-100);
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 500;
  color: var(--stone-500);
  transition: all 0.25s;
}
.step.active {
  background: var(--teal-600);
  color: white;
  font-weight: 600;
  transform: scale(1.02);
  box-shadow: 0 2px 8px rgba(13, 148, 136, 0.3);
}
.step.done {
  background: var(--teal-100);
  color: var(--teal-700);
}

/* ===== List items (courses, members) ===== */
.list-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: white;
  border: 1.5px solid var(--stone-200);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 0.18s;
  margin-bottom: 10px;
  text-decoration: none;
  color: inherit;
}
.list-item:hover {
  border-color: var(--teal-500);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.list-item.disabled {
  opacity: 0.55;
  pointer-events: none;
}
.list-item-main { flex: 1; min-width: 0; }
.list-item-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
.list-item-sub { font-size: 12.5px; color: var(--stone-500); }

/* ===== Progress bar (course progress) ===== */
.progress-bar {
  height: 6px;
  background: var(--stone-100);
  border-radius: var(--r-full);
  overflow: hidden;
  margin: 8px 0;
}
.progress-bar-fill {
  height: 100%;
  background: var(--teal-500);
  border-radius: var(--r-full);
  transition: width 0.4s ease;
}
.progress-bar-fill.warning { background: var(--coral-500); }
.progress-bar-fill.danger { background: var(--danger); }

/* ===== Loading skeleton ===== */
@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--stone-100) 0%, var(--stone-50) 50%, var(--stone-100) 100%);
  background-size: 1000px 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--r-md);
}

/* ===== Utilities ===== */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex-1 { flex: 1; }
.text-center { text-align: center; }
.text-muted { color: var(--stone-500); }
.text-sm { font-size: 13px; }
.text-xs { font-size: 12px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.w-full { width: 100%; }

/* ===== Mobile tweaks ===== */
@media (max-width: 640px) {
  body { font-size: 14px; }
  .app-header { padding: 12px 16px; }
  .container { padding: 16px; }
  .card { padding: 18px; border-radius: var(--r-md); }
  h1 { font-size: 1.25rem; }
  h2 { font-size: 1.25rem; }
  .radio-group { grid-template-columns: 1fr; }
}

/* ===== Animations ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeInUp 0.35s ease-out; }

/* ===== Hero block (used on landing) ===== */
.hero {
  text-align: center;
  padding: 24px 0 12px;
}
.hero-emoji {
  font-size: 3rem;
  display: inline-block;
  filter: drop-shadow(0 4px 8px rgba(13, 148, 136, 0.2));
  margin-bottom: 8px;
}
.hero-title {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.15;
  background: linear-gradient(135deg, var(--stone-900) 0%, var(--teal-700) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-sub { color: var(--stone-500); font-size: 1rem; margin-top: 6px; }

/* ===== Menu cards (landing) ===== */
.menu-grid {
  display: grid;
  gap: 12px;
  margin-top: 24px;
}
.menu-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: white;
  border: 1.5px solid var(--stone-200);
  border-radius: var(--r-lg);
  text-decoration: none;
  color: inherit;
  transition: all 0.2s;
}
.menu-item:hover {
  transform: translateY(-2px);
  border-color: var(--teal-500);
  box-shadow: var(--shadow-md);
}
.menu-item.disabled {
  opacity: 0.5;
  pointer-events: none;
}
.menu-item-icon {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  background: var(--teal-50);
}
.menu-item-icon.coral { background: var(--coral-50); }
.menu-item-icon.warm { background: var(--warning-bg); }
.menu-item-text { flex: 1; }
.menu-item-title { font-weight: 600; font-size: 16px; }
.menu-item-sub { color: var(--stone-500); font-size: 13px; margin-top: 2px; }
.menu-item-arrow {
  color: var(--stone-300);
  font-size: 1.25rem;
  transition: transform 0.2s;
}
.menu-item:hover .menu-item-arrow {
  transform: translateX(4px);
  color: var(--teal-600);
}

  .kiosk-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  @media (max-width: 768px) {
    .kiosk-grid { grid-template-columns: 1fr; padding: 12px; gap: 14px; }
  }
  .panel { display: flex; flex-direction: column; gap: 12px; }
  .course-remaining {
    font-size: 1.75rem;
    font-weight: 700;
    line-height: 1;
  }
  .recent {

  }
  .recent-row {

  .recent-name { flex: 1; font-weight: 500; }
</style>

<header class="app-header">
  <div class="app-header-inner">
    <div class="brand">
      <span class="brand-emoji">📷</span>
      <div>เช็คชื่อด้วยใบหน้า<br><span class="brand-sub" id="clock"></span></div>

</header>

<main class="kiosk-grid">
  <div class="camera-card">
    <video id="video" autoplay muted playsinline></video>

    <div class="camera-overlay">

</main>

<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzarzLBCNsC9CLRNkwcdUo1RZZCrHpkkswhzNQWNuKJxqQZ28XIBHdd-JEWwkor1pdy/exec',
  API_KEY: 'ALPHA BADMINTON-KRABI',
  BUSINESS_NAME: 'ALPHA BADMINTON KRABI',
  FACE_MATCH_THRESHOLD: 0.5,
  FACE_DESCRIPTOR_SAMPLES: 5,
  MODELS_URL: 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights',
  CACHE_TTL_MS: 30000,
};

// Browser-side cache to avoid hitting API repeatedly
const Cache = {
  get(key) {
    try {
      const raw = localStorage.getItem('ab_' + key);
      if (!raw) return null;
      const { data, expires } = JSON.parse(raw);
      if (Date.now() > expires) {
        localStorage.removeItem('ab_' + key);
        return null;
      }
      return data;
    } catch (e) { return null; }
  },
  set(key, data, ttlMs) {
    try {
      localStorage.setItem('ab_' + key, JSON.stringify({
        data,
        expires: Date.now() + (ttlMs || CONFIG.CACHE_TTL_MS),
      }));
    } catch (e) {}
  },
  clear(key) {
    if (key) localStorage.removeItem('ab_' + key);
    else Object.keys(localStorage).filter(k => k.startsWith('ab_')).forEach(k => localStorage.removeItem(k));
  },
};

const api = {
  async call(action, params = {}) {
    const res = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ apiKey: CONFIG.API_KEY, action, params }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'API error');
    return data.data;
  },

  // Cached version: try cache first, then fetch
  async callCached(action, params = {}, ttlMs) {
    const key = action + '_' + JSON.stringify(params);
    const cached = Cache.get(key);
    if (cached) return cached;
    const data = await this.call(action, params);
    Cache.set(key, data, ttlMs);
    return data;
  },

  ping() { return this.call('ping'); },
  getCourses() { return this.callCached('getCourses', {}, 5 * 60 * 1000); },
  getMember(uuid) { return this.call('getMember', { uuid }); },
  searchMember(query) { return this.call('searchMember', { query }); },
  getMembersForFaceMatch() { return this.callCached('getMembersForFaceMatch', {}, 60000); },
  createMember(data) {
    Cache.clear();
    return this.call('createMember', data);
  },
  registerFace(personUuid, descriptors) {
    Cache.clear();
    return this.call('registerFace', { personUuid, descriptors });
  },
  getActiveEnrollments(memberUuid) {
    return this.call('getActiveEnrollments', { memberUuid });
  },
  checkIn(personUuid, enrollmentUuid, coachUuid, method) {
    return this.call('checkIn', { personUuid, enrollmentUuid, coachUuid, method });
  },
  getAttendanceToday() { return this.call('getAttendanceToday'); },
};

const Face = {
  loaded: false,
  async loadModels() {
    if (this.loaded) return;
    await faceapi.nets.tinyFaceDetector.loadFromUri(CONFIG.MODELS_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(CONFIG.MODELS_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(CONFIG.MODELS_URL);
    this.loaded = true;
  },
  async detectFaceWithDescriptor(videoEl) {
    return await faceapi
      .detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({
        inputSize: 320, scoreThreshold: 0.5
      }))
      .withFaceLandmarks()
      .withFaceDescriptor();
  },
  computeMatch(queryDescriptor, candidates, threshold) {
    threshold = threshold || CONFIG.FACE_MATCH_THRESHOLD;
    let best = null;
    candidates.forEach(c => {
      if (!c.FaceDescriptors) return;
      try {
        const data = typeof c.FaceDescriptors === 'string'
          ? JSON.parse(c.FaceDescriptors) : c.FaceDescriptors;
        ['front', 'left', 'right'].forEach(pose => {
          if (!data[pose]) return;
          const stored = new Float32Array(data[pose]);
          const dist = faceapi.euclideanDistance(queryDescriptor, stored);
          if (dist < threshold && (!best || dist < best.distance)) {
            best = { member: c, pose: pose, distance: dist };
          }
        });
      } catch (e) {}
    });
    return best;
  },
  averageDescriptors(descriptors) {
    if (descriptors.length === 0) return null;
    const dim = descriptors[0].length;
    const avg = new Float32Array(dim);
    descriptors.forEach(d => {
      for (let i = 0; i < dim; i++) avg[i] += d[i];
    });
    for (let i = 0; i < dim; i++) avg[i] /= descriptors.length;
    return Array.from(avg);
  },
};
</script>
<script>
const videoEl = document.getElementById('video');
const overlayEl = document.getElementById('overlay');
const cameraStatusEl = document.getElementById('cameraStatus');
let candidates = [];
let detecting = false;
let coolingDown = false;
let todayAttendance = [];

function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short' }) + ' · ' +
    d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

function setStatus(title, message, isError) {
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusMessage').textContent = message || '';
  document.getElementById('statusCard').style.borderColor = isError ? 'var(--danger)' : '';
}

function setProgress(pct) {
  document.getElementById('loadProgress').style.width = pct + '%';
}

async function init() {
  try {
    setStatus('⏳ โหลดโมเดล...', 'face recognition model');
    setProgress(15);
    await Face.loadModels();
    setProgress(50);

    setStatus('⏳ โหลดข้อมูลสมาชิก...');
    candidates = await api.getMembersForFaceMatch();
    setProgress(75);

    setStatus('⏳ เปิดกล้อง...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    videoEl.srcObject = stream;
    await new Promise(r => videoEl.onloadedmetadata = r);
    overlayEl.width = videoEl.videoWidth;
    overlayEl.height = videoEl.videoHeight;
    setProgress(100);

    setStatus('✓ พร้อมใช้งาน', 'สมาชิก ' + candidates.length + ' คน · มองเข้ากล้องเพื่อเช็คชื่อ');
    cameraStatusEl.textContent = '👀 กำลังตรวจจับ...';

    loadRecent();
    setInterval(loadRecent, 30000);
    detectLoop();
  } catch (e) {
    setStatus('✗ เกิดข้อผิดพลาด', e.message, true);
    console.error(e);
  }
}

async function loadRecent() {
  try {
    todayAttendance = await api.getAttendanceToday();
    const list = document.getElementById('recentList');
    document.getElementById('todayCount').textContent = todayAttendance.length + ' คน';
    if (todayAttendance.length === 0) {
      list.innerHTML = '<p class="text-muted text-sm">ยังไม่มีใครมาเรียน</p>';
      return;
    }
    list.innerHTML = todayAttendance.slice(0, 12).map(r => {
      const t = new Date(r.CheckInDateTime).toLocaleTimeString('th-TH',
        { hour: '2-digit', minute: '2-digit' });
      const pillCls = r.Role === 'student' ? 'pill-info' : 'pill-success';
      const roleLabel = r.Role === 'student' ? 'นักเรียน' : (r.Role === 'staff' ? 'ผู้ช่วย' : 'admin');
      return `<div class="recent-row">
        <span class="recent-time">${t}</span>
        <span class="recent-name">${r.Name}</span>
        <span class="pill ${pillCls}">${roleLabel}</span>
      </div>`;
    }).join('');
  } catch (e) { console.error('loadRecent', e); }
}

async function detectLoop() {
  if (coolingDown) { setTimeout(detectLoop, 300); return; }
  if (!detecting) {
    detecting = true;
    try {
      const detection = await Face.detectFaceWithDescriptor(videoEl);
      const ctx = overlayEl.getContext('2d');
      ctx.clearRect(0, 0, overlayEl.width, overlayEl.height);
      if (detection) {
        const box = detection.detection.box;
        ctx.strokeStyle = '#14B8A6';
        ctx.lineWidth = 3;
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        const match = Face.computeMatch(detection.descriptor, candidates);
        if (match) await onMatch(match);
      }
    } catch (e) { console.error('detect', e); }
    finally { detecting = false; }
  }
  setTimeout(detectLoop, 300);
}

async function onMatch(match) {
  coolingDown = true;
  cameraStatusEl.textContent = '✓ ' + (match.member.Nickname || match.member.FirstName);
  document.getElementById('statusCard').style.display = 'none';
  const memberCard = document.getElementById('memberCard');
  memberCard.style.display = 'block';
  document.getElementById('memberName').textContent =
    (match.member.Nickname || match.member.FirstName);
  const roleLabel = match.member.Role === 'student' ? 'นักเรียน' :
                    match.member.Role === 'staff' ? 'ผู้ช่วยสอน' : 'แอดมิน';
  document.getElementById('memberId').textContent =
    match.member.DisplayID + ' · ' + roleLabel;

  if (match.member.Role === 'staff' || match.member.Role === 'admin') {
    await checkInStaff(match.member);
  } else {
    await showCourses(match.member);
  }
}

async function showCourses(member) {
  const card = document.getElementById('coursesCard');
  card.style.display = 'block';
  const list = document.getElementById('coursesList');
  list.innerHTML = '<p class="text-muted text-sm">กำลังโหลดคอร์ส...</p>';
  try {
    const enrollments = await api.getActiveEnrollments(member.UUID);
    if (enrollments.length === 0) {
      list.innerHTML = '<div class="alert alert-warning"><span>⚠️</span><div>ยังไม่มีคอร์สที่ active · ติดต่อแอดมินเพื่อสมัครคอร์ส</div></div>';
      setTimeout(reset, 5000);
      return;
    }
    list.innerHTML = '';
    let allCheckedIn = true;
    enrollments.forEach(e => {
      const alreadyCheckedIn = todayAttendance.some(a =>
        a.PersonUUID === member.UUID && a.CourseUUID === e.CourseUUID && !a.IsVoided);
      if (!alreadyCheckedIn) allCheckedIn = false;

      const div = document.createElement('div');
      div.className = 'list-item' + (alreadyCheckedIn ? ' disabled' : '');
      const warn = e.RemainingSessions <= 2;
      const progressCls = warn ? 'warning' : '';
      const pct = e.TotalSessions > 0 ? (e.UsedSessions / e.TotalSessions * 100) : 0;
      div.innerHTML = `
        <div class="list-item-main">
          <div class="list-item-title">${e.CourseName || '-'}
            ${alreadyCheckedIn ? '<span class="pill pill-success" style="margin-left:8px;">✓ มาแล้ววันนี้</span>' : ''}
          </div>
          <div class="list-item-sub">หมด ${e.ExpiryDate || '-'} · เหลือ ${e.DaysLeft} วัน</div>
          <div class="progress-bar"><div class="progress-bar-fill ${progressCls}" style="width: ${pct}%;"></div></div>
        </div>
        <div style="text-align:right;">
          <div class="course-remaining" style="color: ${warn ? 'var(--coral-600)' : 'var(--teal-600)'}">${e.RemainingSessions}</div>
          <div class="text-xs text-muted">เหลือ / ${e.TotalSessions} ครั้ง</div>
        </div>
      `;
      if (!alreadyCheckedIn) div.onclick = () => doCheckIn(member, e);
      list.appendChild(div);
    });

    if (allCheckedIn) {
      const info = document.createElement('div');
      info.className = 'alert alert-info mt-3';
      info.innerHTML = '<span>ⓘ</span><div>คุณมาเรียนทุกคอร์สแล้ววันนี้ ไม่ต้อง check-in ซ้ำ</div>';
      list.appendChild(info);
      setTimeout(reset, 5000);
    }
  } catch (err) {
    list.innerHTML = '<div class="alert alert-danger"><span>✗</span><div>' + err.message + '</div></div>';
    setTimeout(reset, 5000);
  }
}

async function checkInStaff(member) {
  const alreadyIn = todayAttendance.some(a =>
    a.PersonUUID === member.UUID && a.Role !== 'student' && !a.IsVoided);
  if (alreadyIn) {
    const t = todayAttendance.find(a => a.PersonUUID === member.UUID);
    const time = new Date(t.CheckInDateTime).toLocaleTimeString('th-TH',
      { hour: '2-digit', minute: '2-digit' });
    document.getElementById('resultArea').innerHTML =
      '<div class="card animate-in"><div class="alert alert-info"><span>ⓘ</span><div>เข้างานไปแล้ววันนี้ เวลา ' + time + '</div></div></div>';
    setTimeout(reset, 4000);
    return;
  }
  try {
    await api.checkIn(member.UUID, null, null, 'face');
    const t = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('resultArea').innerHTML =
      '<div class="card animate-in"><div class="alert alert-success"><span>🎉</span><div><strong>มาสนุกแล้ว!</strong> เวลา ' + t + '</div></div></div>';
    loadRecent();
    setTimeout(reset, 4000);
  } catch (e) { showError(e.message); }
}

async function doCheckIn(member, enrollment) {
  document.getElementById('coursesCard').style.display = 'none';
  try {
    const result = await api.checkIn(member.UUID, enrollment.UUID, null, 'face');
    const warnHtml = (result.warnings || []).map(w =>
      '<div class="alert alert-warning mt-2"><span>⚠️</span><div>' + w.text + '</div></div>').join('');
    document.getElementById('resultArea').innerHTML = `
      <div class="card animate-in">
        <div class="alert alert-success"><span>🎉</span><div><strong>มาสนุกแล้ว!</strong> ${result.enrollment.CourseName}</div></div>
        <div class="flex items-center justify-between mt-3" style="background: var(--teal-50); padding: 16px; border-radius: var(--r-md);">
          <div>
            <p class="text-sm text-muted">เหลือ</p>
            <p style="font-size: 2rem; font-weight: 700; color: var(--teal-700); line-height: 1;">${result.enrollment.Remaining} <span style="font-size: 1rem; color: var(--stone-500); font-weight: 500;">/ ${result.enrollment.Total} ครั้ง</span></p>
          </div>
          <div style="text-align: right;">
            <p class="text-sm text-muted">หมดอายุ</p>
            <p style="font-weight: 600;">${result.enrollment.ExpiryDate}</p>
            <p class="text-xs text-muted">เหลือ ${result.enrollment.DaysLeft} วัน</p>
          </div>
        </div>
        ${warnHtml}
      </div>
    `;
    loadRecent();
    setTimeout(reset, 6000);
  } catch (e) { showError(e.message); }
}

function showError(msg) {
  document.getElementById('resultArea').innerHTML =
    '<div class="card"><div class="alert alert-danger"><span>✗</span><div>' + msg + '</div></div></div>';
  setTimeout(reset, 5000);
}

function reset() {
  coolingDown = false;
  document.getElementById('statusCard').style.display = 'block';
  document.getElementById('memberCard').style.display = 'none';
  document.getElementById('coursesCard').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '';
  setStatus('✓ พร้อมใช้งาน', 'สมาชิก ' + candidates.length + ' คน · มองเข้ากล้องเพื่อเช็คชื่อ');
  cameraStatusEl.textContent = '👀 กำลังตรวจจับ...';
}

init();
</script>
